# ─────────────────────────────────────────────────────────────
# Shared Backend Config
# ─────────────────────────────────────────────────────────────
x-backend-env: &backend-env
  env_file: ./backend/.env
  networks:
    - dvt-net
  restart: unless-stopped

# ─────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────
services:

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    container_name: dvt-frontend
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/api/v1/ws/live}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dvt-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── FastAPI ────────────────────────────────────────────────
  api:
    container_name: dvt-api
    <<: *backend-env
    build:
      context: ./backend
      target: api
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    container_name: dvt-worker
    <<: *backend-env
    build:
      context: ./backend
      target: worker
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: celery -A workers.celery_app worker --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app inspect ping || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3

  # ── Celery Beat ───────────────────────────────────────────
  scheduler:
    container_name: dvt-scheduler
    <<: *backend-env
    build:
      context: ./backend
      target: scheduler
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    container_name: dvt-postgres
    image: postgres:15-alpine
    env_file: ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - dvt-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvt_user -d dvt_talent"]
      interval: 10s
      retries: 5

  # ── Redis ────────────────────────────────────────────────
  redis:
    container_name: dvt-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dvt-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── ChromaDB ─────────────────────────────────────────────
  chromadb:
    container_name: dvt-chromadb
    image: chromadb/chroma:0.4.24
    environment:
      IS_PERSISTENT: TRUE
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: FALSE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - dvt-net
    restart: unless-stopped

  # ── Flower ────────────────────────────────────────────────
  flower:
    container_name: dvt-flower
    <<: *backend-env
    build:
      context: ./backend
      target: worker
    command: celery -A workers.celery_app flower --port=5555
    profiles:
      - monitoring

  # ── Caddy Proxy ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: dvt-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - dvt-net
    depends_on:
      - frontend
      - api

# ─────────────────────────────────────────────────────────────
# Networks & Volumes
# ─────────────────────────────────────────────────────────────
networks:
  dvt-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  caddy_data:
  caddy_config: