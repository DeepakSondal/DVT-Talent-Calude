# DVT Talent AI — Ruff Configuration
line-length = 100
target-version = "py310"

[lint]
select = ["E", "F", "I", "N", "ASYNC", "S", "B", "PL"]
ignore = ["E501"] # Line length handled by formatter

[lint.isort]
known-first-party = ["agents", "api", "communication", "db", "workers"]

[lint.pylint]
max-args = 8
max-branches = 12

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
