groups:
  - name: dvt_alerts
    rules:
      - alert: APIDown
        expr: up{job="dvt-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "DVT API is down"
          description: "The FastAPI backend has been unreachable for > 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate (>5%)"
          description: "More than 5% of requests are returning 5xx errors."

      - alert: HighP99Latency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency exceeds 3 seconds"
          description: "99th percentile API latency is above 3 seconds."

      - alert: RedisDown
        expr: up{job="dvt-redis"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable. Celery workers and agent signals will fail."

      - alert: CeleryWorkerDown
        expr: absent(celery_workers_total) or celery_workers_total == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "No Celery workers online"
          description: "No Celery workers are available to process agent tasks."

      - alert: AgentTaskFailureSpike
        expr: rate(agent_tasks_total{status="failed"}[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High agent task failure rate"
          description: "Agent tasks are failing at a rate > 0.1/sec over the last 10 minutes."
